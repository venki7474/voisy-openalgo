services:
  openalgo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voisy_openalgo
    ports:
      - "${FLASK_PORT:-5000}:5000"
      - "${WEBSOCKET_PORT:-8765}:8765"

    volumes:
      # --- BIND MOUNTS (Easily accessible on your VM) ---
      - ./data/db:/app/db                 # Database files
      - ./data/logs:/app/logs             # Web server logs
      - ./data/log:/app/log               # App logic logs
      - ./strategies:/app/strategies      # YOUR PYTHON CODE (Edit these here!)
      - ./data/keys:/app/keys             # API Keys
      - ./.env:/app/.env:ro               # Read-only env file

    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-0}
    restart: unless-stopped

# We removed the 'volumes:' section at the bottom because we are 
# using Bind Mounts (direct folder paths) instead of Named Volumes.
