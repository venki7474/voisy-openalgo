<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broker Management</title>
</head>
<body>
    <h1>Broker Management</h1>

    <h2>Add New Broker</h2>
    <form action="/add_broker" method="post">
        <label for="broker_name">Broker Name:</label>
        <input type="text" id="broker_name" name="broker_name" required>
        <br>
        <label for="api_key">API Key:</label>
        <input type="text" id="api_key" name="api_key" required>
        <br>
        <label for="api_secret">API Secret:</label>
        <input type="password" id="api_secret" name="api_secret" required>
        <br>
        <button type="submit">Add Broker</button>
    </form>

    <h2>Your Brokers</h2>
    <table>
        <thead>
            <tr>
                <th>Broker Name</th>
                <th>API Key</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <!-- Broker data will be populated here -->
        </tbody>
    </table>
</body>
</html>
