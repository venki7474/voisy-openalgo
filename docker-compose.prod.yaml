services:
  openalgo:
    image: voisydev.azurecr.io/voisy-openalgo:latest
    container_name: voisy_openalgo
    platform: linux/amd64
    ports:
      - "${FLASK_PORT:-5000}:5000"
      - "${WEBSOCKET_PORT:-8765}:8765"

    volumes:
      # --- BIND MOUNTS (Easily accessible on your VM) ---
      - ./data/db:/app/db:z                 # Database files
      - ./data/logs:/app/logs:z             # Web server logs
      - ./data/log:/app/log:z               # App logic logs
      - ./strategies:/app/strategies:z      # YOUR PYTHON CODE (Edit these here!)
      - ./data/keys:/app/keys:z             # API Keys
      - ./.env:/app/.env:ro               # Read-only env file

    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-0}
    restart: unless-stopped
  nginx:
    image: nginx:stable-alpine
    container_name: voisy_openalgo_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - openalgo
# We removed the 'volumes:' section at the bottom because we are 
# using Bind Mounts (direct folder paths) instead of Named Volumes.
