services:
  openalgo:
    build:
      context: .
      dockerfile: Dockerfile
    image: voisydev.azurecr.io/voisy-openalgo:latest-arm64  # Tag it clearly
    container_name: voisy_openalgo
    
    # We REMOVE the 'platform: linux/amd64' to ensure native execution
    
    ports:
      - "${FLASK_PORT:-5000}:5000"
      - "${WEBSOCKET_PORT:-8765}:8765"

    volumes:
      # Named volumes for better performance and easier Docker-managed permissions
      - openalgo_db:/app/db
      - openalgo_log:/app/log
      - openalgo_strategies:/app/strategies
      - openalgo_keys:/app/keys
      - openalgo_tmp:/app/tmp
      # .env stays as a bind mount so you can edit it easily on the host
      - ./.env:/app/.env:ro

    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-0}

    # Highly recommended for Scipy/Numba performance on ARM
    shm_size: '2gb'

    deploy:
      resources:
        reservations:
          cpus: '2.0'
          memory: 12GB
        limits:
          cpus: '4.0'
          memory: 16GB

    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/auth/check-setup"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s # Increased for first-time ARM compilation (Numba/cache)

    restart: unless-stopped
  nginx:
    image: nginx:stable-alpine
    container_name: voisy_openalgo_proxy
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/letsencrypt:/etc/letsencrypt
    depends_on:
      - openalgo
# Define named volumes
volumes:
  openalgo_db:
    driver: local
  openalgo_log:
    driver: local
  openalgo_strategies:
    driver: local
  openalgo_keys:
    driver: local
  openalgo_tmp:
    driver: local